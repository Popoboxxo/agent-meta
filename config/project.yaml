# HINWEIS: Diese Datei ist KEIN Fallback mehr für die Self-Hosting-Konfiguration.
#
# Die Projekt-Config für das agent-meta Meta-Repo selbst liegt unter:
#   .meta-config/project.yaml
#
# Dieses Verzeichnis (config/) enthält ausschließlich Framework-Defaults:
#   config/role-defaults.yaml          ← Rollen-Defaults (model, memory, permissionMode, tier)
#   config/dod-presets.yaml            ← DoD-Qualitätsprofile
#   config/ai-providers.yaml           ← Provider-Konfiguration
#   config/skills-registry.yaml        ← Zentrale Skill-Registry
#   config/project-config.schema.json  ← JSON Schema für project.yaml (IDE-Validierung)
#
# Zielprojekte legen ihre Konfiguration unter .meta-config/project.yaml an.
# Siehe howto/instantiate-project.md für die vollständige Einrichtung.
