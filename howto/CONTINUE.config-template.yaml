# Continue configuration — generated by agent-meta
# See https://docs.continue.dev for full documentation
#
# This file is a STARTING POINT for local LLM setups.
# Customize models, context length and roles to your hardware.
# NEVER overwritten by sync.py — edit freely.
#
# ──────────────────────────────────────────────────────────────
# HARDWARE PROFILE: AMD RX 9070 XT (16 GB VRAM, ROCm)
# Fits comfortably: qwen2.5-coder:14b (~9 GB), qwen2.5-coder:7b (~4.5 GB)
# Does NOT fit:     qwen2.5-coder:32b (~20 GB)
# ──────────────────────────────────────────────────────────────

name: Local LLM Workspace
version: 1.0.0
schema: v1

# ──────────────────────────────────────────────────────────────
# MODELS
# ──────────────────────────────────────────────────────────────
models:

  # Primary coder — chat, edit and agent mode
  # Tool calling supported natively → Agent Mode works
  - name: Qwen2.5 Coder 14B (Agent)
    provider: ollama
    model: qwen2.5-coder:14b
    roles: [chat, edit, agent]
    defaultCompletionOptions:
      contextLength: 16384      # reduce to 8192 if OOM

  # Fast reviewer / second opinion for chat
  - name: Llama 3.1 8B (Chat)
    provider: ollama
    model: llama3.1:8b
    roles: [chat]
    defaultCompletionOptions:
      contextLength: 8192

  # Autocomplete — small model, low latency
  - name: Qwen2.5 Coder 7B (Autocomplete)
    provider: ollama
    model: qwen2.5-coder:7b
    roles: [autocomplete]
    defaultCompletionOptions:
      contextLength: 4096

  # Embeddings for @codebase context
  - name: Nomic Embed Text
    provider: ollama
    model: nomic-embed-text
    roles: [embed]

# ──────────────────────────────────────────────────────────────
# AGENT MODE
# Rules are loaded from .continue/rules/ automatically.
# Agents are in .continue/agents/ — invoke by name in Agent Mode.
# ──────────────────────────────────────────────────────────────

# ──────────────────────────────────────────────────────────────
# RULES (auto-loaded into every context)
# Local rules in .continue/rules/ are loaded automatically.
# No explicit reference needed for local files.
# ──────────────────────────────────────────────────────────────

# ──────────────────────────────────────────────────────────────
# PROMPTS (Slash-Commands via "/" — works with any local model)
# Use these as fallback when Agent Mode does not work.
# ──────────────────────────────────────────────────────────────
